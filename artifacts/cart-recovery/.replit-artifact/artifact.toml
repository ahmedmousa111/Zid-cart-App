kind = "web"
previewPath = "/"
title = "Cart Recovery"
version = "1.0.0"
id = "artifacts/cart-recovery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22828

[services.development]
run = "pnpm --filter @workspace/cart-recovery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cart-recovery", "run", "build" ]
publicDir = "artifacts/cart-recovery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22828"
BASE_PATH = "/"
